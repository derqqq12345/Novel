<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Qwen Chat</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 16px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
      font-weight: bold;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .msg {
      margin-bottom: 16px;
      line-height: 1.5;
      max-width: 70%;
      padding: 12px 14px;
      border-radius: 12px;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
    }

    .bot {
      background: #1e293b;
    }

    footer {
      display: flex;
      padding: 12px;
      border-top: 1px solid #1e293b;
      background: #020617;
    }

    textarea {
      flex: 1;
      resize: none;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      margin-left: 10px;
      padding: 0 20px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

<header>🤖 Qwen Chat (Ollama)</header>

<div id="chat"></div>

<footer>
  <textarea id="input" rows="2" placeholder="메시지 입력..."></textarea>
  <button onclick="send()">전송</button>
</footer>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");

  function addMessage(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const botMsg = document.createElement("div");
    botMsg.className = "msg bot";
    botMsg.textContent = "생각 중...";
    chat.appendChild(botMsg);

    try {
      const res = await fetch("http://localhost:11434/api/generate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "qwen:14b",
          prompt: text,
          stream: false
        })
      });

      const data = await res.json();
      botMsg.textContent = data.response;

    } catch (e) {
      botMsg.textContent = "❌ 오류: Ollama 연결 실패";
    }

    chat.scrollTop = chat.scrollHeight;
  }

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
</script>

</body>
</html>
